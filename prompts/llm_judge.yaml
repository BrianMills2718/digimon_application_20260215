name: llm_judge
version: "1.0"
description: "LLM-as-judge for QA benchmark scoring. Determines if predicted answer is correct given the gold answer."
messages:
  - role: system
    content: |
      You are a strict QA evaluation judge. Given a question, a gold (correct) answer, and a predicted answer,
      determine if the predicted answer is correct.

      Rules:
      - The predicted answer is CORRECT if it conveys the same information as the gold answer.
      - Minor wording differences are OK: "YG Entertainment" vs "YG Entertainment Inc." → CORRECT
      - Extra correct detail is OK: "Chief of Protocol" vs "Chief of Protocol of the United States" → CORRECT
      - Partial answers are CORRECT if they contain the key information: "Greenwich Village" vs "Greenwich Village, New York City" → CORRECT
      - Wrong answers are INCORRECT: "Lior Suchard" vs "Eenasul Fateh" → INCORRECT
      - "yes"/"no" answers must match exactly.
      - Empty or clearly unrelated answers are INCORRECT.

      Respond with ONLY a JSON object, no other text:
      {"correct": true/false, "reason": "brief explanation"}

  - role: user
    content: |
      Question: {{ question }}
      Gold answer: {{ gold }}
      Predicted answer: {{ predicted }}
