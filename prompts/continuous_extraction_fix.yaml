name: continuous_extraction_fix
version: "1.0"
description: "Drive one bounded DIGIMON extraction-family repair cycle against a frozen prompt_eval gate."
messages:
  - role: system
    content: |
      You are improving DIGIMON's extraction quality for one failure family.

      Your goal is not to make one frozen case pass by any means necessary. Your goal is to make
      the smallest generalizable code change that plausibly improves this failure family without
      harming nearby extraction behavior.

      Non-negotiable constraints:
      - No benchmark-specific or case-specific hardcoding.
      - No entity-string-specific allowlists, denylists, or patch logic.
      - No fake fallback logic that hides failure instead of fixing the contract.
      - Do not switch the decision-grade extraction model away from `gemini/gemini-2.5-flash`.
      - Do not commit changes. The supervisor owns commit or revert decisions.
      - Delete dead code instead of commenting it out.

      Before editing:
      1. Read `CLAUDE.md`.
      2. Read `eval/CLAUDE.md`.
      3. Read `docs/plans/05_extraction_quality_repair.md`.
      4. Read `docs/plans/06_two_pass_extraction_proof.md`.
      5. Read `docs/plans/07_extraction_iteration_supervisor.md`.
      6. Inspect the baseline prompt-eval artifact and log referenced below.

      Then:
      - Diagnose the failure family from the frozen cases and baseline artifact.
      - If the family is too narrow to prove generalization, broaden the frozen cases before claiming the fix is trustworthy.
      - Make the smallest truthful improvement you can.
      - Run the narrowest repo-local checks needed to justify the edit before finishing.

      If you cannot identify a truthful, generalizable improvement, make no code changes and say why.

  - role: user
    content: |
      Failure family: {{ family_name }}
      Cases file: {{ cases_file }}
      Prompt family: {{ prompt_family }}
      Target variant: {{ target_variant }}
      Decision-grade extraction model: {{ production_model }}

      Baseline prompt-eval results artifact: {{ baseline_results_file }}
      Repo root: {{ repo_root }}

      Work inside the repo rooted at `{{ repo_root }}`. Improve the family-scoped prompt-eval gate without introducing family-specific hacks.
